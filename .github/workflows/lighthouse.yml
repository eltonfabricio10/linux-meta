name: Lighthouse CI

# Manual-only: this boots the app against a populated DB, but there is no seed
# fixture in the repo (data comes from a private dump), so it can't pass on a
# plain push. Re-enable push/pull_request once a CI seed exists.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lhci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse budgets
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: linuxmeta
          POSTGRES_USER: linuxmeta
          POSTGRES_PASSWORD: linuxmeta
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U linuxmeta -d linuxmeta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://linuxmeta:linuxmeta@localhost:5432/linuxmeta
      POSTGRES_DB: linuxmeta
      POSTGRES_USER: linuxmeta
      POSTGRES_PASSWORD: linuxmeta
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @linux-meta/web build

      - name: Start web app (preview)
        shell: bash
        run: |
          nohup pnpm --filter @linux-meta/web dev >/tmp/web.log 2>&1 &
          echo $! > /tmp/web.pid
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:4400/ >/dev/null 2>&1; then
              echo "web up"
              exit 0
            fi
            sleep 2
          done
          echo "web failed to start" >&2
          tail -n 200 /tmp/web.log >&2 || true
          exit 1

      - name: Write Lighthouse CI config
        shell: bash
        run: |
          cat > /tmp/lighthouserc.json <<'JSON'
          {
            "ci": {
              "collect": {
                "url": [
                  "http://localhost:4400/pt",
                  "http://localhost:4400/pt/browse",
                  "http://localhost:4400/pt/p/firefox",
                  "http://localhost:4400/pt/status",
                  "http://localhost:4400/pt/transparencia"
                ],
                "numberOfRuns": 1,
                "settings": {
                  "preset": "desktop",
                  "chromeFlags": "--no-sandbox --headless=new"
                }
              },
              "assert": {
                "assertions": {
                  "categories:performance":      ["error", { "minScore": 0.85 }],
                  "categories:accessibility":    ["error", { "minScore": 0.95 }],
                  "categories:best-practices":   ["error", { "minScore": 0.95 }],
                  "categories:seo":              ["error", { "minScore": 0.95 }]
                }
              },
              "upload": { "target": "temporary-public-storage" }
            }
          }
          JSON

      - name: Run Lighthouse CI
        shell: bash
        run: npx --yes @lhci/cli@0.14.x autorun --config=/tmp/lighthouserc.json

      - name: Stop web app
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/web.pid ]; then
            kill "$(cat /tmp/web.pid)" 2>/dev/null || true
          fi

      - name: Upload web server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-server-log
          path: /tmp/web.log
          if-no-files-found: ignore
          retention-days: 7
