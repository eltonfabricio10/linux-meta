name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    name: Build & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @linux-meta/web build

      - name: Astro type-check (fail on errors)
        run: pnpm --filter @linux-meta/web exec astro check

  # NOTE: e2e (Playwright), Axe and Lighthouse are NOT run here. They boot the
  # app against a populated database, and there is no seed fixture in the repo
  # (real data comes from a private dump). Those workflows are kept as
  # manual-only (workflow_dispatch) until a CI seed exists. See docs/DEPLOY-ICP.md.

  audit:
    name: pnpm audit (warn only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Audit high-severity vulnerabilities (warn)
        shell: bash
        run: |
          set +e
          pnpm audit --audit-level=high
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning::pnpm audit reported high-severity vulnerabilities (non-blocking)"
          fi
          exit 0
