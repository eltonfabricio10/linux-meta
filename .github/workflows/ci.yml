name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, type-check, e2e smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: linuxmeta
          POSTGRES_USER: linuxmeta
          POSTGRES_PASSWORD: linuxmeta
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U linuxmeta -d linuxmeta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://linuxmeta:linuxmeta@localhost:5432/linuxmeta
      POSTGRES_DB: linuxmeta
      POSTGRES_USER: linuxmeta
      POSTGRES_PASSWORD: linuxmeta
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @linux-meta/web build

      - name: Astro type-check (fail on errors)
        run: pnpm --filter @linux-meta/web exec astro check

      - name: Install Playwright browsers
        run: pnpm --filter @linux-meta/e2e exec playwright install --with-deps chromium

      - name: Playwright e2e smoke
        run: pnpm --filter @linux-meta/e2e exec playwright test --reporter=line

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore
          retention-days: 7

  audit:
    name: pnpm audit (warn only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Audit high-severity vulnerabilities (warn)
        shell: bash
        run: |
          set +e
          pnpm audit --audit-level=high
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning::pnpm audit reported high-severity vulnerabilities (non-blocking)"
          fi
          exit 0
