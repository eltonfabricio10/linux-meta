name: Axe a11y

# Manual-only: this boots the app against a populated DB, but there is no seed
# fixture in the repo (data comes from a private dump), so it can't pass on a
# plain push. Re-enable push/pull_request once a CI seed exists.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: axe-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  axe:
    name: Axe-core a11y (serious/critical)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: linuxmeta
          POSTGRES_USER: linuxmeta
          POSTGRES_PASSWORD: linuxmeta
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U linuxmeta -d linuxmeta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://linuxmeta:linuxmeta@localhost:5432/linuxmeta
      POSTGRES_DB: linuxmeta
      POSTGRES_USER: linuxmeta
      POSTGRES_PASSWORD: linuxmeta
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @linux-meta/web build

      - name: Install Playwright browsers
        run: pnpm --filter @linux-meta/e2e exec playwright install --with-deps chromium

      - name: Run axe a11y spec (ephemeral @axe-core/playwright)
        shell: bash
        working-directory: e2e
        run: npx --yes --package=@axe-core/playwright@4 -- playwright test ../apps/web/tests/e2e/a11y.spec.ts --reporter=line

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: axe-playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore
          retention-days: 7
