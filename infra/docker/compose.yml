name: linux-meta

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: linuxmeta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: linuxmeta
      POSTGRES_PASSWORD: linuxmeta
      POSTGRES_DB: linuxmeta
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init/01-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linuxmeta -d linuxmeta"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true

  # Ollama opcional (busca semântica). Liga só quando Fase 6 começar.
  ollama:
    image: ollama/ollama:latest
    container_name: linuxmeta-ollama
    profiles: ["embed"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    security_opt:
      - no-new-privileges:true
