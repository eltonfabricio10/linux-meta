# Production compose for the ICP Core VPS (4 vCPU AMD EPYC x86_64, 6 GB RAM),
# a box SHARED with other projects. Postgres + web only.
#
# TLS + reverse proxy are handled by the iContainer panel's OpenResty (front
# door on 80/443). This stack publishes the web app on 127.0.0.1:4400 and the
# panel proxies linux-meta.duckdns.org -> http://127.0.0.1:4400 with SSL.
#
# Semantic search (Ollama) was REMOVED to keep the footprint small on the
# shared host. The app detects the missing OLLAMA_URL and serves text search
# (trigram) instead — no failed calls, no error logs. To re-enable later, add
# back an ollama service, set OLLAMA_URL, and run workers/embed-backfill.mjs.
name: linux-meta

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: linuxmeta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: linuxmeta
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linuxmeta}
      POSTGRES_DB: linuxmeta
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init/01-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - max_connections=40
      - -c
      - effective_cache_size=1536MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linuxmeta -d linuxmeta"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 1536m
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        PUBLIC_SITE_URL: https://linux-meta.duckdns.org
        PUBLIC_DEFAULT_LOCALE: pt
    container_name: linuxmeta-web
    restart: unless-stopped
    env_file:
      - ../../.env.prod
    environment:
      # Heap ceiling under the cgroup limit so Node GCs before the OOM killer.
      NODE_OPTIONS: --max-old-space-size=768
    depends_on:
      postgres:
        condition: service_healthy
    # Publish ONLY on loopback: the panel's OpenResty (on the host)
    # reverse-proxies to this. Not reachable directly from the internet.
    ports:
      - "127.0.0.1:4400:4400"
    mem_limit: 1024m
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
